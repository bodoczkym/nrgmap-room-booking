databaseChangeLog:
  - changeSet:
      id: 002-create-booking-table
      author: bodoczkym
      changes:
        - createTable:
            tableName: booking
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: room_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: booker_name
                  type: VARCHAR(255)
              - column:
                  name: booker_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: booking
            baseColumnNames: room_id
            referencedTableName: room
            referencedColumnNames: id
            constraintName: fk_booking_room
